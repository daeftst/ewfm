# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

defaults:
  - override /energy: lj13
  - override /model/net: egnn

tags: ["LJ13"]

seed: 42

logger:
  wandb:
    tags: ${tags}
    group: "lj13"

model:
  net:
    n_particles: 13
    n_layers: 5
    hidden_nf: 128

  p_0_prior:
    _target_: ewfm.models.components.base_prior.MeanFreePrior
    n_particles: 13
    spatial_dim: 3
    scale: 2.0
    device: ${..device}

  q_1_prior:
    _target_: ewfm.models.components.base_prior.MeanFreePrior
    n_particles: 13
    spatial_dim: 3
    scale: 2.0
    device: ${..device}
