# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
defaults:
  - override /energy: gmm

tags: ["GMM"]

seed: 42

logger:
  wandb:
    tags: ${tags}
    group: "gmm"

model:
  p_0_prior:
    _target_: ewfm.models.components.base_prior.Prior
    dim: 2
    scale: 0.5
    device: ${..device}

  q_1_prior:
    _target_: ewfm.models.components.base_prior.Prior
    dim: 2
    scale: 1
    device: ${..device}

  scheduler: null
